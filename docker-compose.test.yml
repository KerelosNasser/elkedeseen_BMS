services:
  test-db:
    image: postgres:15-alpine
    container_name: elkedeseen-test-db
    environment:
      POSTGRES_USER: testuser
      POSTGRES_PASSWORD: testpassword
      POSTGRES_DB: elkedeseen_test
    ports:
      - "5435:5432" # Use a different port than default to avoid conflicts
    volumes:
      - test-db-data:/var/lib/postgresql/data

volumes:
  test-db-data:
